<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BalanceDocket Build Week end card</title>
    <style>
      /* Hallmark · pre-emit critique: P5 H5 E5 S5 R5 V5 */
      :root {
        --color-ink: #201b17;
        --color-paper: #fffdf8;
        --color-exception: #a94034;
        --color-exception-soft: #faece8;
        --color-rule: #918374;
        --font-interface: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        --font-display: "New York", Georgia, serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: clip;
      }
      body {
        background: var(--color-ink);
        color: var(--color-paper);
        font-family: var(--font-interface);
      }
      main {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr auto;
        width: 100%;
        height: 100%;
        /* Reserve the lower 220 px for Final Cut's closed-caption overlay. */
        padding: 74px 94px 250px;
      }
      main::before,
      main::after {
        position: absolute;
        content: "";
        background: var(--color-rule);
        opacity: 0.34;
      }
      main::before {
        top: 0;
        bottom: 0;
        left: 38%;
        width: 1px;
      }
      main::after {
        right: 0;
        bottom: 220px;
        left: 0;
        height: 1px;
      }
      .eyebrow,
      .track {
        margin: 0;
        font-size: 21px;
        font-weight: 760;
        letter-spacing: 0.16em;
      }
      .eyebrow { color: var(--color-exception-soft); }
      .hero {
        align-self: center;
        max-width: 1450px;
      }
      .accent {
        width: 142px;
        height: 12px;
        margin-bottom: 44px;
        background: var(--color-exception);
      }
      h1 {
        margin: 0;
        font-family: var(--font-display);
        font-size: 142px;
        font-weight: 700;
        letter-spacing: -0.045em;
        line-height: 0.94;
      }
      .descriptor {
        margin: 48px 0 0;
        max-width: 1220px;
        font-size: 48px;
        font-weight: 620;
        letter-spacing: -0.018em;
        line-height: 1.25;
      }
      footer {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 48px;
        padding-top: 38px;
      }
      .track { color: var(--color-exception-soft); font-size: 18px; }
      .url {
        margin: 0;
        font-size: 32px;
        font-weight: 650;
        letter-spacing: 0.005em;
      }
    </style>
  </head>
  <body>
    <main aria-label="BalanceDocket OpenAI Build Week closing card">
      <p class="eyebrow">OPENAI BUILD WEEK 2026</p>
      <section class="hero">
        <div class="accent" aria-hidden="true"></div>
        <h1>BalanceDocket</h1>
        <p class="descriptor">Rules calculate · GPT-5.6 interprets · Humans decide</p>
      </section>
      <footer>
        <p class="track">WORK &amp; PRODUCTIVITY</p>
        <p class="url">github.com/Yurii201811/closeproof</p>
      </footer>
    </main>
  </body>
</html>
